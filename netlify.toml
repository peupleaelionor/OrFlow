[build]
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @orflow/web... build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  # Ensure pnpm is available via corepack
  COREPACK_ENABLE_STRICT = "0"

# Next.js runtime plugin — handles SSR, API routes, ISR, and all routing
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# Netlify Functions configuration for SSR / API routes
[functions]
  node_bundler = "esbuild"
  included_files = ["node_modules/@orflow/**"]
