[build]
  command = "npm install -g pnpm@9 && pnpm install --no-frozen-lockfile && pnpm --filter @orflow/web... build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Next.js runtime plugin — handles SSR, API routes, ISR, and all routing
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
